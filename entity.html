<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peak Breath — Visual</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#000">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #000; overflow: hidden; }
    .ascii-art {
      font-size: clamp(0.25rem, 0.9vw, 0.6rem);
      line-height: 1.05;
      color: #ff66aa;
      text-shadow:
        0 0 2px rgba(255, 102, 170, 0.8),
        0 0 8px rgba(255, 102, 170, 0.4),
        0 0 20px rgba(180, 50, 120, 0.3);
      letter-spacing: 0.05em;
    }
    .info-content code { color: #aa4488; }

    @keyframes breathGlow {
      0%, 100% {
        text-shadow:
          0 0 2px rgba(255, 102, 170, 0.8),
          0 0 8px rgba(255, 102, 170, 0.4),
          0 0 20px rgba(180, 50, 120, 0.3);
      }
      50% {
        text-shadow:
          0 0 4px rgba(255, 130, 200, 1),
          0 0 15px rgba(255, 102, 170, 0.6),
          0 0 35px rgba(200, 80, 150, 0.5);
      }
    }

    .ascii-art {
      animation: breathGlow 4s ease-in-out infinite;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← back</a>
  <details class="info">
    <summary>?</summary>
    <div class="info-content">
      <p>80×50 multi-centered entity at 60fps:</p>
      <ul>
        <li>3 drifting void-eyes orbiting in Lissajous patterns</li>
        <li>12 reaching tentacles with sine-wave undulation</li>
        <li>Cellular noise interference, membrane edges</li>
        <li>Characters: <code>  ░▒▓█▓▒░ ◠◡⊙●○◎</code></li>
      </ul>
    </div>
  </details>
  <main>
    <pre id="canvas" class="ascii-art"></pre>
  </main>
  <script>
    const W = 80;
    const H = 50;
    // More dramatic density ramp with special void character
    const chars = '  .·░▒▓███▓▒░·.  ';

    let time = 0;
    const canvas = document.getElementById('canvas');

    // Simplex-like noise for organic texture
    function noise(x, y, t) {
      return Math.sin(x * 1.3 + t) * Math.cos(y * 1.7 - t * 0.7) *
             Math.sin((x + y) * 0.9 + t * 0.5) +
             Math.sin(x * 2.1 - t * 1.1) * Math.sin(y * 1.9 + t * 0.8) * 0.5;
    }

    // 3 void-eyes that orbit in complex Lissajous patterns
    function getVoidCenters(t) {
      return [
        { // Primary eye - slow figure-8
          x: W/2 + Math.sin(t * 0.23) * 15,
          y: H/2 + Math.sin(t * 0.31) * Math.cos(t * 0.17) * 10,
          size: 1.2 + 0.3 * Math.sin(t * 0.5)
        },
        { // Secondary eye - wider orbit
          x: W/2 + Math.cos(t * 0.19) * 22,
          y: H/2 + Math.sin(t * 0.29) * 12,
          size: 0.8 + 0.2 * Math.sin(t * 0.7 + 1)
        },
        { // Tertiary eye - fast small orbit
          x: W/2 + Math.sin(t * 0.41) * 10 + Math.cos(t * 0.13) * 8,
          y: H/2 + Math.cos(t * 0.37) * 8,
          size: 0.6 + 0.15 * Math.sin(t * 0.9 + 2)
        }
      ];
    }

    // Tentacle function - returns intensity at point from a tentacle
    function tentacle(x, y, t, baseAngle, length, speed, phase) {
      const cx = W / 2;
      const cy = H / 2;

      // Tentacle grows outward from center at baseAngle
      const angle = baseAngle + 0.3 * Math.sin(t * speed + phase);

      // Sample points along tentacle
      let intensity = 0;
      for (let d = 5; d < length; d += 2) {
        // Tentacle path with sinuous movement
        const wave = Math.sin(d * 0.15 + t * speed * 2 + phase) * (d * 0.12);
        const tx = cx + Math.cos(angle) * d + Math.cos(angle + Math.PI/2) * wave;
        const ty = cy + Math.sin(angle) * d * 0.5 + Math.sin(angle + Math.PI/2) * wave * 0.5;

        // Distance from point to this tentacle segment
        const dx = x - tx;
        const dy = (y - ty) * 2; // Stretch vertically
        const dist = Math.sqrt(dx * dx + dy * dy);

        // Tentacle thickness decreases with distance from center
        const thickness = Math.max(1, 4 - d * 0.06);
        if (dist < thickness) {
          intensity = Math.max(intensity, (1 - dist / thickness) * (1 - d / length));
        }
      }
      return intensity;
    }

    function entityValue(x, y, t) {
      let val = 0;

      // Get drifting void centers
      const voids = getVoidCenters(t);

      // Void eyes - dark centers with bright edges (inverted gaussian)
      for (const v of voids) {
        const dx = (x - v.x) / 8;
        const dy = (y - v.y) / 4;
        const r = Math.sqrt(dx * dx + dy * dy);

        // Dark void center
        const voidCore = -Math.exp(-r * r * 0.8 * v.size) * 2;
        // Bright membrane edge
        const membrane = Math.exp(-Math.pow(r - 1.5, 2) * 2) * v.size;
        val += voidCore + membrane;
      }

      // 12 reaching tentacles
      const numTentacles = 12;
      for (let i = 0; i < numTentacles; i++) {
        const baseAngle = (i / numTentacles) * Math.PI * 2 + t * 0.05;
        const length = 30 + 10 * Math.sin(t * 0.3 + i);
        val += tentacle(x, y, t, baseAngle, length, 0.5 + i * 0.1, i * 0.7) * 1.5;
      }

      // Cellular noise - organic texture throughout
      const cellNoise = noise(x * 0.08, y * 0.12, t * 0.5) * 0.4;
      val += cellNoise;

      // Interference ripples from void centers
      for (const v of voids) {
        const dx = x - v.x;
        const dy = (y - v.y) * 2;
        const r = Math.sqrt(dx * dx + dy * dy);
        val += Math.sin(r * 0.5 - t * 2) * Math.exp(-r * 0.05) * 0.3;
      }

      // Pulsing outer boundary membrane
      const cx = (x - W/2) / (W/3);
      const cy = (y - H/2) / (H/3);
      const outerR = Math.sqrt(cx * cx + cy * cy);
      const boundary = Math.exp(-Math.pow(outerR - 1.3 - 0.1 * Math.sin(t), 2) * 8);
      val += boundary * 0.6;

      // Global breathing modulation
      const breath = 1 + 0.15 * Math.sin(t * 0.4);
      val *= breath;

      return val;
    }

    function render() {
      let output = '';

      for (let y = 0; y < H; y++) {
        for (let x = 0; x < W; x++) {
          const val = entityValue(x, y, time);

          // Map to character - handle negative values (voids) specially
          let idx;
          if (val < -0.5) {
            // Deep void - use space
            idx = 0;
          } else {
            const normalized = (val + 1) / 3;
            const clamped = Math.max(0, Math.min(1, normalized));
            idx = Math.floor(clamped * (chars.length - 1));
          }

          output += chars[idx];
        }
        output += '\n';
      }

      canvas.textContent = output;
      time += 0.016;
      requestAnimationFrame(render);
    }

    render();
  </script>
  <script src="widget.js"></script>
</body>
</html>
